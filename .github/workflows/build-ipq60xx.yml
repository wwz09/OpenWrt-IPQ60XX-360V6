# OpenWrt IPQ60XX 平台自动编译工作流
# 作者: 李杰
# 功能: 编译 IPQ60XX 系列设备固件

name: Build IPQ60XX Firmware

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
    inputs:
      device:
        description: '选择要编译的设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - jdcloud-re-ss-01
          - qihoo-360v6
          - xiaomi-ax1800
          - zn-m2
      ssh:
        description: '是否启用SSH调试 (true/false)'
        required: false
        default: 'false'
        type: string
  
  # 定时触发 (每周日凌晨3点)
  schedule:
    - cron: '0 3 * * 0'
  
  # 代码推送触发
  push:
    branches:
      - main
      - master
    paths:
      - 'configs/**'
      - '.github/workflows/**'
      - 'scripts/**'

# 权限配置
permissions:
  contents: write

# 环境变量
env:
  # 源码仓库地址
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  # 源码分支
  REPO_BRANCH: main-nss
  # 第三方插件仓库
  PACKAGE_URL: https://github.com/kenzok8/openwrt-packages
  # 依赖包仓库
  DEPENDENCY_URL: https://github.com/wwz09/QCA-Package
  # 固件发布配置
  RELEASE_TAG: IPQ60XX-AutoBuild-${{ github.run_number }}
  RELEASE_NAME: IPQ60XX 自动编译固件 ${{ github.run_number }}
  # 编译配置
  TZ: Asia/Shanghai
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: configs/.config
  DIY_P1_SH: Scripts/diy-part1.sh
  DIY_P2_SH: Scripts/diy-part2.sh

jobs:
  # 准备阶段 - 检出代码
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置编译矩阵
        id: set-matrix
        run: |
          # 根据输入设置编译矩阵
          if [ "${{ github.event.inputs.device }}" = "all" ] || [ -z "${{ github.event.inputs.device }}" ]; then
            echo 'matrix={"device":["jdcloud-re-ss-01","qihoo-360v6","xiaomi-ax1800","zn-m2"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"device":["${{ github.event.inputs.device }}"]}' >> $GITHUB_OUTPUT
          fi

  # 编译阶段
  build:
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.prepare.outputs.matrix)}}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 更新软件包列表
          sudo apt-get update
          # 安装编译依赖
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build \
            p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev
          # 清理
          sudo apt-get clean
          # 设置时区
          sudo timedatectl set-timezone "$TZ"
          # 设置git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: 克隆OpenWrt源码
        run: |
          # 克隆源码仓库
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          # 显示源码信息
          cd openwrt
          echo "源码仓库: $REPO_URL"
          echo "分支: $REPO_BRANCH"
          echo "最新提交:"
          git log --oneline -1

      - name: 加载自定义feeds
        run: |
          cd openwrt
          # 添加第三方插件仓库到feeds
          echo "src-git kenzo ${{ env.PACKAGE_URL }}" >> feeds.conf.default
          echo "src-git jell ${{ env.DEPENDENCY_URL }}" >> feeds.conf.default
          # 显示feeds配置
          cat feeds.conf.default

      - name: 执行DIY脚本 (Part 1)
        run: |
          cd openwrt
          # 执行第一部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 执行DIY脚本 (Part 2)
        run: |
          cd openwrt
          # 执行第二部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 加载设备配置文件
        run: |
          cd openwrt
          # 根据设备选择对应的配置文件
          case "${{ matrix.device }}" in
            jdcloud-re-ss-01)
              CONFIG_FILE="$GITHUB_WORKSPACE/Config/jdc-ax1800.config"
              ;;
            qihoo-360v6)
              CONFIG_FILE="$GITHUB_WORKSPACE/Config/qihoo-360v6.config"
              ;;
            xiaomi-ax1800)
              CONFIG_FILE="$GITHUB_WORKSPACE/Config/xiaomi-ax1800.config"
              ;;
            zn-m2)
              CONFIG_FILE="$GITHUB_WORKSPACE/Config/zn-m2.config"
              ;;
            *)
              echo "未知设备: ${{ matrix.device }}"
              exit 1
              ;;
          esac
          
          # 复制配置文件
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" .config
            echo "已加载配置文件: $CONFIG_FILE"
          else
            echo "配置文件不存在: $CONFIG_FILE"
            exit 1
          fi
          
          # 展开配置
          make defconfig

      - name: 下载依赖包
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s
          # 验证下载
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 启用SSH调试 (可选)
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event.inputs.ssh == 'true' }}
        with:
          limit-access-to-actor: true

      - name: 开始编译固件
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          # 开始编译
          make -j$(nproc) || make -j1 || make -j1 V=s
          
          # 获取编译结果信息
          echo "status=success" >> $GITHUB_OUTPUT
          
          # 查找生成的固件文件
          FIRMWARE_PATH=$(find bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" \) | head -20)
          echo "找到以下固件文件:"
          echo "$FIRMWARE_PATH"
          
          # 保存固件路径
          echo "FIRMWARE_PATH<<EOF" >> $GITHUB_ENV
          echo "$FIRMWARE_PATH" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 整理固件文件
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt
          # 创建固件输出目录
          mkdir -p $GITHUB_WORKSPACE/firmware/ipq60xx/${{ matrix.device }}
          
          # 复制固件文件
          find bin/targets/ -type f \( -name "*sysupgrade*.bin" -o -name "*factory*.bin" -o -name "*.img.gz" \) -exec cp {} $GITHUB_WORKSPACE/firmware/ipq60xx/${{ matrix.device }}/ \;
          
          # 复制构建信息
          echo "设备: ${{ matrix.device }}" > $GITHUB_WORKSPACE/firmware/ipq60xx/${{ matrix.device }}/buildinfo.txt
          echo "编译时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_WORKSPACE/firmware/ipq60xx/${{ matrix.device }}/buildinfo.txt
          echo "源码版本: $(git rev-parse --short HEAD)" >> $GITHUB_WORKSPACE/firmware/ipq60xx/${{ matrix.device }}/buildinfo.txt
          
          # 显示整理后的文件
          echo "整理后的固件文件:"
          ls -lh $GITHUB_WORKSPACE/firmware/ipq60xx/${{ matrix.device }}/

      - name: 上传固件到Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: IPQ60XX-${{ matrix.device }}-${{ github.run_number }}
          path: |
            firmware/ipq60xx/${{ matrix.device }}/*
          if-no-files-found: error

  # 发布阶段
  release:
    runs-on: ubuntu-22.04
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有Artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          pattern: IPQ60XX-*-${{ github.run_number }}
          merge-multiple: false

      - name: 整理发布文件
        run: |
          # 创建发布目录
          mkdir -p release/ipq60xx
          
          # 移动所有固件到发布目录
          for dir in firmware/IPQ60XX-*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"* release/ipq60xx/
            fi
          done
          
          # 创建发布说明
          cat > release/ipq60xx/release_notes.txt << 'EOF'
          IPQ60XX 自动编译固件
          ====================
          
          编译时间: $(date '+%Y-%m-%d %H:%M:%S')
          源码仓库: LiBwrt/openwrt-6.x
          插件仓库: kenzok8/openwrt-packages
          依赖仓库: wwz09/QCA-Package
          
          支持的设备:
          - JDCLOUD RE-SS-01
          - Qihoo 360 V6
          - Xiaomi AX1800
          - ZN M2
          
          默认包含功能:
          - WiFi无线功能
          - 常用网络插件
          - 第三方插件包
          
          固件说明:
          - factory.bin:  factory固件，用于首次刷机
          - sysupgrade.bin: 升级固件，用于系统升级
          
          刷机说明:
          1. 首次刷机请使用 factory 固件
          2. 系统升级请使用 sysupgrade 固件
          3. 刷机前请备份配置
          4. 刷机有风险，请谨慎操作
          
          EOF
          
          # 显示发布文件
          echo "发布文件列表:"
          ls -lh release/ipq60xx/

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            ## IPQ60XX 自动编译固件
            
            ### 编译信息
            - **编译时间**: ${{ github.event.repository.updated_at }}
            - **源码仓库**: [LiBwrt/openwrt-6.x](https://github.com/LiBwrt/openwrt-6.x)
            - **插件仓库**: [kenzok8/openwrt-packages](https://github.com/kenzok8/openwrt-packages)
            - **依赖仓库**: [wwz09/QCA-Package](https://github.com/wwz09/QCA-Package)
            - **工作流运行**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### 支持的设备
            - JDCLOUD RE-SS-01
            - Qihoo 360 V6
            - Xiaomi AX1800
            - ZN M2
            
            ### 默认功能
            - ✅ WiFi无线功能
            - ✅ 常用网络插件
            - ✅ 第三方插件包
            
            ### 固件说明
            | 文件类型 | 用途 |
            |---------|------|
            | `*factory.bin` | 首次刷机使用 |
            | `*sysupgrade.bin` | 系统升级使用 |
            
            ### 刷机提示
            1. ⚠️ 首次刷机请使用 factory 固件
            2. 🔄 系统升级请使用 sysupgrade 固件
            3. 💾 刷机前请备份重要配置
            4. ⚡ 刷机过程中请勿断电
            
            ### 注意事项
            - 本固件为自动编译生成，仅供测试使用
            - 刷机有风险，请谨慎操作
            - 使用前请仔细阅读相关文档
          files: |
            release/ipq60xx/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10
