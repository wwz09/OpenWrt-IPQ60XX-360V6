name: Build LibWrt

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set Execution Permissions
      run: chmod +x build.sh Scripts/*.sh

    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
        zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 \
        python3-distutils python3-pip

    - name: Build LibWrt
      run: ./build.sh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: libwrt-firmware
        path: openwrt/bin/targets/
