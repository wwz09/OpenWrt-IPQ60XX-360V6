name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - cmcc_rax3000m_immwrt  
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - qihoo_360v6_immwrt  
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Generate Configuration Summary
        run: |
          # 输出配置文件到firmware目录
          config_file=$(find ./action_build/bin/targets -name "*.config" 2>/dev/null | head -n 1)
          if [ -n "$config_file" ]; then
            cp "$config_file" ./firmware/config.txt
            echo "已复制配置文件: $config_file -> ./firmware/config.txt"
          else
            echo "警告: 未找到配置文件" > ./firmware/config.txt
          fi
          
          # 生成LUCI插件列表
          {
            echo "## 编译到固件的LUCI插件列表"
            echo "生成时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "设备型号: ${{ inputs.model }}"
            echo ""
            
            # 从manifest文件获取插件信息
            manifest_file=$(find ./firmware -name "*.manifest" 2>/dev/null | head -n 1)
            if [ -n "$manifest_file" ]; then
              echo "### 从固件清单中提取的插件（已安装到固件）:" 
              echo ""
              grep -oP "luci-app(-[a-zA-Z0-9_]{1,}){1,}" "$manifest_file" | sort | uniq
              echo ""
            fi
          } > ./firmware/luci_plugins.md
          echo "已生成插件列表: ./firmware/luci_plugins.md"

      - name: Process Firmware Files
        run: |
          # 批量重命名固件：移除"openwrt-qualcommax-"前缀
          for file in ./firmware/*.*; do
            # 只处理文件，不处理目录
            [ -f "$file" ] || continue
            
            # 获取文件名（不含路径）
            filename=$(basename "$file")
            
            # 跳过已生成的配置文件、插件列表、清单文件和校验文件
            if [[ "$filename" == "config.txt" || "$filename" == "luci_plugins.md" || "$filename" == *.manifest || "$filename" == "sha256sums.txt" ]]; then
              continue
            fi
            
            # 检查文件名是否包含需要移除的前缀
            if [[ "$filename" == openwrt-qualcommax-* ]]; then
              # 移除"openwrt-qualcommax-"前缀
              new_filename="${filename#openwrt-qualcommax-}"
              new_name="./firmware/$new_filename"
              
              # 避免文件覆盖（如果目标文件已存在，添加数字后缀）
              if [ -e "$new_name" ] && [ "$file" != "$new_name" ]; then
                # 获取扩展名
                extension="${new_filename##*.}"
                # 获取不含扩展名的部分
                name_without_ext="${new_filename%.*}"
                counter=1
                while [ -e "./firmware/${name_without_ext}_${counter}.${extension}" ]; do
                  counter=$((counter + 1))
                done
                new_name="./firmware/${name_without_ext}_${counter}.${extension}"
                new_filename="${name_without_ext}_${counter}.${extension}"
              fi
              
              # 执行重命名
              if [ "$file" != "$new_name" ]; then
                mv "$file" "$new_name"
                echo "重命名固件: $filename -> $new_filename"
              fi
            else
              echo "跳过文件（无前缀）: $filename"
            fi
          done
          
          # 生成SHA256校验文件
          echo "生成SHA256校验文件..."
          cd ./firmware
          sha256sum *.* > sha256sums.txt 2>/dev/null || echo "警告: 生成校验文件失败"
          cd ..
          echo "校验文件已生成: ./firmware/sha256sums.txt"
          
          # 输出固件清单
          echo "=============================================="
          echo "发布文件清单:"
          ls -lh ./firmware/
          echo "=============================================="

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "Firmware file count: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "===================================================="

      - name: Package OpenWrt Firmware
        if: ${{ inputs.model == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y
          WHOAMI: ZqinKing

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.1.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
