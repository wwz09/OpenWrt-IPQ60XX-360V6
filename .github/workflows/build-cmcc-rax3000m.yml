name: Build CMCC RAX3000M

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches: [main]
    paths:
      - 'Config/cmcc-rax3000m.config'
      - 'feeds.conf.default'
      - 'scripts/**'
      - '.github/workflows/build-cmcc-rax3000m.yml'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  REPO_BRANCH: main-nss
  DEVICE_NAME: cmcc-rax3000m
  CONFIG_FILE: Config/cmcc-rax3000m.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "$TZ"

      - name: Clone Source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "OpenWrt Commit: $(git rev-parse --short HEAD)"

      - name: Setup Feeds
        run: |
          cd openwrt
          cp "$GITHUB_WORKSPACE/feeds.conf.default" feeds.conf.default
          cat feeds.conf.default

      - name: Run DIY Part1
        run: |
          cd openwrt
          chmod +x $GITHUB_WORKSPACE/Scripts/diy-part1.sh
          $GITHUB_WORKSPACE/Scripts/diy-part1.sh

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run DIY Part2
        run: |
          cd openwrt
          chmod +x $GITHUB_WORKSPACE/Scripts/diy-part2.sh
          $GITHUB_WORKSPACE/Scripts/diy-part2.sh || echo "DIY Part 2 执行完成（可能有警告）"

      - name: Load Config
        run: |
          cd openwrt
          cp "$GITHUB_WORKSPACE/$CONFIG_FILE" .config
          # 修复递归依赖问题：直接修改包的 Makefile
          # 1. 修复 nikki -> firewall4 依赖
          if [ -f "feeds/packages/net/nikki/Makefile" ]; then
            sed -i 's/DEPENDS.*+firewall4/DEPENDS:=/g' feeds/packages/net/nikki/Makefile
            echo "已修复 nikki 的依赖"
          fi
          # 2. 修复 luci-app-fchomo -> nikki 依赖
          if [ -f "feeds/small/luci-app-fchomo/Makefile" ]; then
            sed -i 's/DEPENDS.*+nikki/DEPENDS:=/g' feeds/small/luci-app-fchomo/Makefile
            echo "已修复 luci-app-fchomo 的依赖"
          fi
          # 3. 修复 python3-email <-> python3-urllib 依赖
          if [ -f "feeds/packages/lang/python/python3-email/Makefile" ]; then
            sed -i 's/DEPENDS.*+python3-urllib/DEPENDS:=/g' feeds/packages/lang/python/python3-email/Makefile
            echo "已修复 python3-email 的依赖"
          fi
          if [ -f "feeds/packages/lang/python/python3-urllib/Makefile" ]; then
            sed -i 's/DEPENDS.*+python3-email/DEPENDS:=/g' feeds/packages/lang/python/python3-urllib/Makefile
            echo "已修复 python3-urllib 的依赖"
          fi
          # 强制禁用导致递归依赖的包
          cat >> .config << 'EOF'
          # 禁用递归依赖的包
          CONFIG_PACKAGE_luci-app-fchomo=n
          CONFIG_PACKAGE_nikki=n
          CONFIG_PACKAGE_fwupd=n
          CONFIG_PACKAGE_python3-email=n
          CONFIG_PACKAGE_python3-urllib=n
          # 内核配置选项 - 避免交互式提示
          CONFIG_NF_CONNTRACK_DSCPREMARK_EXT=n
          EOF
          # 设置环境变量确保完全非交互式
          export KCONFIG_CONFIG=.config
          export KCONFIG_NOTIMESTAMP=true
          export KCONFIG_AUTOCONFIG=1
          # 使用 OpenWrt 的配置工具处理配置
          make defconfig || echo "defconfig完成"
          # 再次确保禁用递归依赖的包和内核选项
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_luci-app-fchomo=n
          CONFIG_PACKAGE_nikki=n
          CONFIG_PACKAGE_fwupd=n
          CONFIG_PACKAGE_python3-email=n
          CONFIG_PACKAGE_python3-urllib=n
          CONFIG_NF_CONNTRACK_DSCPREMARK_EXT=n
          EOF
          make defconfig || echo "最终defconfig完成"
          # 为内核编译添加非交互式处理
          echo "export KCONFIG_AUTOCONFIG=1" >> .profile
          echo "export KCONFIG_NOTIMESTAMP=true" >> .profile
          echo "export KCONFIG_CONFIG=.config" >> .profile
          source .profile

      - name: Download Packages
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s
          find dl -size -1024c -delete

      - name: Compile
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Collect Firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt
          mkdir -p $GITHUB_WORKSPACE/firmware
          find bin/targets/ -type f \( -name "*sysupgrade*.bin" -o -name "*factory*.bin" \) -exec cp {} $GITHUB_WORKSPACE/firmware/ \;
          ls -lh $GITHUB_WORKSPACE/firmware/

      - name: Upload Artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_NAME }}-${{ github.run_number }}
          path: firmware/*

  release:
    runs-on: ubuntu-22.04
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.DEVICE_NAME }}-${{ github.run_number }}
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.DEVICE_NAME }}-${{ github.run_number }}
          name: CMCC RAX3000M Build ${{ github.run_number }}
          body: |
            **Build Info:**
            - Device: CMCC RAX3000M
            - Date: ${{ github.event.repository.updated_at }}
            - Commit: ${{ github.sha }}
            
            **Firmware Files:**
            - `*factory.bin` - First time flash
            - `*sysupgrade.bin` - Upgrade existing
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
