# OpenWRT-CI 同步工作流
# 作者: 李杰
# 功能: 定期同步 VIKINGYFY/OpenWRT-CI 仓库到本项目

name: Sync OpenWRT-CI

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发 (每天凌晨 2 点)
  schedule:
    - cron: '0 2 * * *'

# 权限配置
permissions:
  contents: write
  pull-requests: write

# 环境变量
env:
  SOURCE_REPO: https://github.com/VIKINGYFY/OpenWRT-CI.git
  SOURCE_BRANCH: main
  TARGET_BRANCH: main
  SYNC_DIR: openwrt_ci_sync

jobs:
  # 同步任务
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: 检出本项目代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 克隆源仓库
      run: |
        git clone --depth 1 --single-branch -b $SOURCE_BRANCH $SOURCE_REPO $SYNC_DIR

    - name: 同步文件
      run: |
        # 同步脚本文件
        echo "同步脚本文件..."
        if [ -d "$SYNC_DIR/scripts" ]; then
          mkdir -p "Scripts/sync"
          cp -r "$SYNC_DIR/scripts"/* "Scripts/sync/"
        fi
        
        # 同步配置文件
        echo "同步配置文件..."
        if [ -d "$SYNC_DIR/configs" ]; then
          mkdir -p "wrt_core/configs_sync"
          cp -r "$SYNC_DIR/configs"/* "wrt_core/configs_sync/"
        fi
        
        # 同步其他有用的文件
        echo "同步其他文件..."
        if [ -d "$SYNC_DIR/docs" ]; then
          mkdir -p "docs/sync"
          cp -r "$SYNC_DIR/docs"/* "docs/sync/"
        fi

    - name: 清理临时目录
      run: |
        rm -rf "$SYNC_DIR"

    - name: 检查更改
      run: |
        git status
        git diff

    - name: 提交更改
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        
        git add .
        
        # 检查是否有更改
        if git diff --cached --exit-code; then
          echo "没有更改，跳过提交"
        else
          git commit -m "同步 OpenWRT-CI 仓库更新"
          git push
        fi

    - name: 同步完成
      run: |
        echo "========================================"
        echo "OpenWRT-CI 同步完成！"
        echo "========================================"
