# OpenWrt 配置测试工作流
# 作者: 李杰
# 功能: 测试配置文件的有效性和功能完整性

name: Test OpenWrt Config

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
    inputs:
      device:
        description: '选择要测试的设备'
        required: true
        default: 'qihoo-360v6'
        type: choice
        options:
          - qihoo-360v6
          - xiaomi-ax1800
          - zn-m2
          - jdc-ax1800
  # 代码推送触发
  push:
    branches:
      - main
      - master
    paths:
      - 'Config/**'
      - 'Scripts/**'
      - '.github/workflows/test-config.yml'

# 权限配置
permissions:
  contents: read

# 环境变量
env:
  # 源码仓库地址
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  # 源码分支
  REPO_BRANCH: main-nss
  # 第三方插件仓库
  PACKAGE_URL: https://github.com/kenzok8/openwrt-packages
  # 依赖包仓库
  DEPENDENCY_URL: https://github.com/wwz09/QCA-Package
  # 编译配置
  TZ: Asia/Shanghai
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: Scripts/diy-part1.sh
  DIY_P2_SH: Scripts/diy-part2.sh

jobs:
  # 测试阶段
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化测试环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 更新软件包列表
          sudo apt-get update
          # 安装必要的依赖
          sudo apt-get install -y 
            git curl wget 
            build-essential 
            libncurses5-dev libncursesw5-dev 
            zlib1g-dev gawk flex gettext 
            unzip python3 python3-pyelftools
          # 清理
          sudo apt-get clean
          # 设置时区
          sudo timedatectl set-timezone "$TZ"
          # 设置git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: 克隆OpenWrt源码
        run: |
          # 克隆源码仓库
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          # 显示源码信息
          cd openwrt
          echo "源码仓库: $REPO_URL"
          echo "分支: $REPO_BRANCH"
          echo "最新提交:"
          git log --oneline -1

      - name: 加载自定义feeds
        run: |
          cd openwrt
          # 添加第三方插件仓库到feeds
          echo "src-git kenzo ${{ env.PACKAGE_URL }}" >> feeds.conf.default
          echo "src-git jell ${{ env.DEPENDENCY_URL }}" >> feeds.conf.default
          # 显示feeds配置
          cat feeds.conf.default

      - name: 执行DIY脚本 (Part 1)
        run: |
          cd openwrt
          # 执行第一部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 执行DIY脚本 (Part 2)
        run: |
          cd openwrt
          # 执行第二部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 执行DIY脚本 (Part 3)
        run: |
          cd openwrt
          # 执行第三部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/Scripts/diy-part3.sh
          $GITHUB_WORKSPACE/Scripts/diy-part3.sh

      - name: 加载设备配置文件
        run: |
          cd openwrt
          # 根据设备选择对应的配置文件
          CONFIG_FILE="$GITHUB_WORKSPACE/Config/${{ github.event.inputs.device || 'qihoo-360v6' }}.config"
          
          # 复制配置文件
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" .config
            echo "已加载配置文件: $CONFIG_FILE"
          else
            echo "配置文件不存在: $CONFIG_FILE"
            exit 1
          fi
          
          # 展开配置
          make defconfig

      - name: 检查配置有效性
        run: |
          cd openwrt
          # 检查配置是否有效
          echo "检查配置有效性..."
          make kernel_oldconfig
          if [ $? -eq 0 ]; then
            echo "✓ 配置文件有效"
          else
            echo "✗ 配置文件无效"
            exit 1
          fi

      - name: 检查依赖关系
        run: |
          cd openwrt
          # 检查依赖关系
          echo "检查依赖关系..."
          make -j1 V=s 2>&1 | grep -E "ERROR:|error:|missing"
          if [ $? -eq 0 ]; then
            echo "✗ 发现依赖问题"
            exit 1
          else
            echo "✓ 依赖关系正常"
          fi

      - name: 验证插件兼容性
        run: |
          cd openwrt
          # 验证插件兼容性
          echo "验证插件兼容性..."
          # 检查已启用的插件
          grep -E "CONFIG_PACKAGE_luci-app-.*=y" .config | head -20
          # 检查主题兼容性
          grep -E "CONFIG_PACKAGE_luci-theme-.*=y" .config | head -10
          echo "✓ 插件兼容性验证完成"

      - name: 生成配置报告
        run: |
          cd openwrt
          # 生成配置报告
          mkdir -p $GITHUB_WORKSPACE/test-results
          echo "# 配置测试报告" > $GITHUB_WORKSPACE/test-results/config-report.md
          echo "" >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "## 设备: ${{ github.event.inputs.device || 'qihoo-360v6' }}" >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "" >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "## 已启用的插件:" >> $GITHUB_WORKSPACE/test-results/config-report.md
          grep -E "CONFIG_PACKAGE_luci-app-.*=y" .config | sort | sed 's/CONFIG_PACKAGE_//' | sed 's/=y//' >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "" >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "## 已启用的主题:" >> $GITHUB_WORKSPACE/test-results/config-report.md
          grep -E "CONFIG_PACKAGE_luci-theme-.*=y" .config | sort | sed 's/CONFIG_PACKAGE_//' | sed 's/=y//' >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "" >> $GITHUB_WORKSPACE/test-results/config-report.md
          echo "## 测试结果: ✅ 配置有效，依赖正常" >> $GITHUB_WORKSPACE/test-results/config-report.md
          cat $GITHUB_WORKSPACE/test-results/config-report.md

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.event.inputs.device || 'qihoo-360v6' }}
          path: test-results/
